<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptHub — Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-2: #181818;
            --surface-3: #202020;
            --surface-4: #2a2a2a;
            --primary: #E8FF47;
            --primary-dim: rgba(232,255,71,0.1);
            --on-primary: #0a0a0a;
            --text: #FAFAFA;
            --text-2: rgba(250,250,250,0.55);
            --text-3: rgba(250,250,250,0.28);
            --border: rgba(255,255,255,0.07);
            --border-2: rgba(255,255,255,0.12);
            --green: #4ade80;
            --orange: #fb923c;
            --blue: #60a5fa;
            --red: #f87171;
            --statusbar-bg: #131313;
            --statusbar-h: 24px;
            --titlebar-h: 40px;
            --toolbar-h: 44px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

        /* ─── Title bar ─── */
        .titlebar {
            height: var(--titlebar-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 14px;
            user-select: none;
            position: relative;
            flex-shrink: 0;
        }

        .traffic-lights {
            display: flex;
            gap: 7px;
            margin-right: 18px;
        }

        .tl {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: filter 0.15s;
        }

        .tl:hover { filter: brightness(1.2); }
        .tl-close  { background: #ff5f57; border: 0.5px solid rgba(0,0,0,0.2); }
        .tl-min    { background: #febc2e; border: 0.5px solid rgba(0,0,0,0.12); }
        .tl-max    { background: #28c840; border: 0.5px solid rgba(0,0,0,0.12); }

        .titlebar-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .brand-mark-sm {
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 4px;
            display: grid;
            place-items: center;
        }

        .brand-mark-sm svg { width: 12px; height: 12px; }

        .titlebar-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 15px;
            letter-spacing: 0.07em;
            color: var(--text-2);
        }

        .titlebar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-3);
        }

        .breadcrumb-sep { opacity: 0.4; }

        /* ─── Toolbar ─── */
        .toolbar {
            height: var(--toolbar-h);
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 2px;
            flex-shrink: 0;
        }

        .tb-btn {
            height: 30px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 7px;
            background: transparent;
            border: none;
            color: var(--text-2);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
            text-decoration: none;
            white-space: nowrap;
        }

        .tb-btn:hover { background: var(--surface-3); color: var(--text); }
        .tb-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

        .tb-sep {
            width: 1px;
            height: 18px;
            background: var(--border);
            margin: 0 4px;
        }

        .tb-spacer { flex: 1; }

        .tb-file-status {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            color: var(--text-3);
            padding: 0 6px;
        }

        .modified-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--orange);
            display: none;
        }

        .tb-btn-save {
            background: var(--primary) !important;
            color: var(--on-primary) !important;
            font-weight: 700 !important;
            border-radius: 5px;
            gap: 8px;
        }

        .tb-btn-save:hover { background: #f0ff6a !important; }

        .save-kbd {
            background: rgba(0,0,0,0.18);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 10px;
            font-family: 'DM Mono', monospace;
        }

        /* ─── Workspace ─── */
        .workspace {
            display: flex;
            flex-direction: column;
            height: calc(100vh - var(--titlebar-h) - var(--toolbar-h) - var(--statusbar-h));
            overflow: hidden;
        }

        /* ─── Tab bar ─── */
        .tabbar {
            height: 36px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .tab {
            height: 36px;
            padding: 0 28px 0 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-2);
            background: var(--surface);
            border-right: 1px solid var(--border);
            cursor: default;
            user-select: none;
            position: relative;
        }

        .tab.active {
            background: var(--bg);
            color: var(--text);
            border-bottom: 1px solid var(--bg);
            margin-bottom: -1px;
        }

        .tab-icon { width: 14px; height: 14px; opacity: 0.7; }

        .tab-close {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.12s, background 0.12s;
        }

        .tab:hover .tab-close,
        .tab.active .tab-close { opacity: 0.5; }
        .tab-close:hover { background: rgba(255,255,255,0.1); opacity: 1 !important; }

        /* ─── Editor ─── */
        .editor-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            background: var(--bg);
        }

        .line-numbers {
            width: 52px;
            background: var(--bg);
            border-right: 1px solid var(--border);
            padding: 16px 8px 16px 0;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            overflow: hidden;
            flex-shrink: 0;
            pointer-events: none;
            user-select: none;
        }

        .ln {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            line-height: 21px;
            color: var(--text-3);
        }

        .editor-scroll {
            flex: 1;
            overflow: auto;
            background: var(--bg);
        }

        #message {
            display: block;
            width: 100%;
            min-height: 100%;
            padding: 16px 20px 80px 16px;
            font-family: 'DM Mono', monospace;
            font-size: 13.5px;
            line-height: 21px;
            color: var(--text);
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            tab-size: 4;
            white-space: pre-wrap;
            word-wrap: break-word;
            caret-color: var(--primary);
        }

        #message::placeholder { color: var(--text-3); font-style: italic; }
        #message::selection { background: rgba(232,255,71,0.15); }

        /* Minimap */
        .minimap {
            width: 52px;
            background: var(--bg);
            border-left: 1px solid var(--border);
            overflow: hidden;
            flex-shrink: 0;
            opacity: 0.45;
        }

        .minimap-content { padding: 16px 4px; }

        .minimap-line {
            height: 2px;
            margin-bottom: 1px;
            background: rgba(255,255,255,0.06);
            border-radius: 1px;
        }

        .minimap-line.filled { background: rgba(232,255,71,0.2); }

        /* ─── Status bar ─── */
        .statusbar {
            height: var(--statusbar-h);
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 10px;
            flex-shrink: 0;
        }

        .status-item {
            height: 100%;
            padding: 0 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-3);
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
            white-space: nowrap;
        }

        .status-item:hover { background: var(--surface-3); color: var(--text-2); }
        .status-spacer { flex: 1; }

        /* ─── Dialog ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.15s, visibility 0.15s;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .dialog {
            width: 400px;
            background: var(--surface-2);
            border: 1px solid var(--border-2);
            border-radius: 10px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .dialog-titlebar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--surface-3);
        }

        .dialog-titlebar svg { color: var(--primary); flex-shrink: 0; }

        .dialog-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 0.05em;
            color: var(--text);
        }

        .dialog-subtitle {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-3);
            font-family: 'DM Mono', monospace;
        }

        .dialog-body { padding: 18px; }

        .field { margin-bottom: 14px; }
        .field:last-child { margin-bottom: 0; }

        .field-label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 7px;
        }

        .field input,
        .field select {
            width: 100%;
            background: var(--surface-4);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 9px 12px;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
            appearance: none;
        }

        .field input:focus,
        .field select:focus { border-color: var(--primary); background: var(--surface-3); }

        .field input::placeholder { color: var(--text-3); }
        .field select option { background: #1e1e1e; }

        .field-row { display: flex; gap: 12px; }
        .field-row .field { flex: 1; }

        .dialog-footer {
            padding: 14px 18px;
            border-top: 1px solid var(--border);
            background: var(--surface-3);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }

        .btn-dialog {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 18px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s ease;
        }

        .btn-dialog-ghost {
            background: transparent;
            color: var(--text-2);
            border-color: var(--border);
        }

        .btn-dialog-ghost:hover { background: var(--surface-4); color: var(--text); }

        .btn-dialog-primary {
            background: var(--primary);
            color: var(--on-primary);
            border-color: transparent;
        }

        .btn-dialog-primary:hover { background: #f0ff6a; }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            bottom: calc(var(--statusbar-h) + 16px);
            right: 20px;
            background: var(--surface-2);
            border: 1px solid var(--border-2);
            border-left: 3px solid var(--green);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 8px 28px rgba(0,0,0,0.6);
            opacity: 0;
            transform: translateX(16px);
            transition: all 0.2s ease;
            z-index: 8000;
            pointer-events: none;
        }

        .toast.show { opacity: 1; transform: translateX(0); }

        .toast-icon {
            width: 16px;
            height: 16px;
            background: var(--green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 9px;
            color: #000;
            font-weight: 900;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin { animation: spin 0.8s linear infinite; }

        @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
    </style>
</head>
<body>

    <!-- Title bar -->
    <div class="titlebar">
        <div class="traffic-lights">
            <div class="tl tl-close"></div>
            <div class="tl tl-min"></div>
            <div class="tl tl-max"></div>
        </div>
        <div class="titlebar-center">
            <div class="brand-mark-sm">
                <svg viewBox="0 0 12 12" fill="none">
                    <rect x="1" y="1" width="4" height="4" rx="1" fill="#0a0a0a"/>
                    <rect x="7" y="1" width="4" height="4" rx="1" fill="#0a0a0a" opacity="0.6"/>
                    <rect x="1" y="7" width="4" height="4" rx="1" fill="#0a0a0a" opacity="0.5"/>
                    <rect x="7" y="7" width="4" height="4" rx="1" fill="#0a0a0a" opacity="0.3"/>
                </svg>
            </div>
            <span class="titlebar-title">Prompt Editor</span>
        </div>
        <div class="titlebar-right">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Prompts
            <span class="breadcrumb-sep">›</span>
            untitled.prompt
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <a href="index.html" class="tb-btn" style="text-decoration:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            Back
        </a>
        <div class="tb-sep"></div>
        <button class="tb-btn" title="Undo (⌘Z)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
            </svg>
        </button>
        <button class="tb-btn" title="Redo (⌘⇧Z)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.51"/>
            </svg>
        </button>
        <div class="tb-sep"></div>
        <div class="tb-file-status">
            <div class="modified-dot" id="modifiedDot"></div>
            <span id="fileLabel">No changes</span>
        </div>
        <div class="tb-spacer"></div>
        <button class="tb-btn tb-btn-save" id="save_button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
            </svg>
            Save Prompt
            <span class="save-kbd">⌘S</span>
        </button>
    </div>

    <!-- Workspace -->
    <div class="workspace">
        <!-- Tab bar -->
        <div class="tabbar">
            <div class="tab active">
                <svg class="tab-icon" viewBox="0 0 16 16" fill="none">
                    <rect x="2" y="2" width="12" height="12" rx="2" stroke="var(--primary)" stroke-width="1.2"/>
                    <path d="M5 6h6M5 9h4" stroke="var(--primary)" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
                untitled.prompt
                <span class="tab-close">
                    <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </span>
            </div>
        </div>

        <!-- Editor -->
        <div class="editor-container">
            <div class="line-numbers" id="lineNumbers">
                <div class="ln">1</div>
            </div>
            <div class="editor-scroll">
                <textarea
                    id="message"
                    name="message"
                    placeholder="// Start writing your prompt here...
//
// Use ⌘S to save, or click 'Save Prompt' in the toolbar."
                    aria-label="Prompt editor"
                    spellcheck="false"
                    autocorrect="off"
                    autocapitalize="off"
                ></textarea>
            </div>
            <div class="minimap" id="minimap">
                <div class="minimap-content" id="minimapContent"></div>
            </div>
        </div>
    </div>

    <!-- Status bar -->
    <div class="statusbar">
        <div class="status-item">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            Ready
        </div>
        <div class="status-item" id="positionStatus">Ln 1, Col 1</div>
        <div class="status-spacer"></div>
        <div class="status-item" id="charStatus">0 chars</div>
        <div class="status-item" id="wordStatus">0 words</div>
        <div class="status-item">Plain Text</div>
        <div class="status-item">UTF-8</div>
        <div class="status-item">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
            Prompt Editor v1.0
        </div>
    </div>

    <!-- Save dialog -->
    <div class="modal-overlay" id="saveModal">
        <div class="dialog">
            <div class="dialog-titlebar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
                <span class="dialog-title">Save Prompt</span>
                <span class="dialog-subtitle">untitled.prompt</span>
            </div>
            <form id="saveForm">
                <div class="dialog-body">
                    <div class="field">
                        <label class="field-label" for="promptName">Prompt Name</label>
                        <input type="text" id="promptName" name="promptName" placeholder="e.g. Customer Support Assistant" required>
                    </div>
                    <div class="field-row">
                        <div class="field">
                            <label class="field-label" for="promptTag">Tag</label>
                            <select id="promptTag" name="promptTag" required>
                                <option value="favorite">⭐ Favorite</option>
                                <option value="not-favorite">· Not Favorite</option>
                            </select>
                        </div>
                        <div class="field">
                            <label class="field-label" for="promptCategory">Category</label>
                            <select id="promptCategory" name="promptCategory" required>
                                <option value="system">System Prompt</option>
                                <option value="user">User Prompt</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="dialog-footer">
                    <button type="button" class="btn-dialog btn-dialog-ghost" id="cancelButton">Cancel</button>
                    <button type="submit" class="btn-dialog btn-dialog-primary">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <div class="toast-icon">✓</div>
        <span>Prompt saved successfully!</span>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const API_URL = "/api";

        const textarea = document.getElementById('message');
        const saveButton = document.getElementById('save_button');
        const saveModal = document.getElementById('saveModal');
        const saveForm = document.getElementById('saveForm');
        const cancelButton = document.getElementById('cancelButton');
        const promptNameInput = document.getElementById('promptName');
        const promptTagSelect = document.getElementById('promptTag');
        const promptCategorySelect = document.getElementById('promptCategory');
        const toast = document.getElementById('toast');
        const charStatus = document.getElementById('charStatus');
        const wordStatus = document.getElementById('wordStatus');
        const positionStatus = document.getElementById('positionStatus');
        const lineNumbers = document.getElementById('lineNumbers');
        const modifiedDot = document.getElementById('modifiedDot');
        const fileLabel = document.getElementById('fileLabel');
        const minimapContent = document.getElementById('minimapContent');

        function updateLineNumbers() {
            const lines = textarea.value.split('\n');
            let html = '';
            for (let i = 1; i <= Math.max(lines.length, 1); i++) {
                html += `<div class="ln">${i}</div>`;
            }
            lineNumbers.innerHTML = html;
        }

        function updateMinimap() {
            const lines = textarea.value.split('\n');
            let html = '';
            lines.forEach(line => {
                const filled = line.trim().length > 0;
                const w = Math.min(100, Math.max(20, line.length * 3));
                html += `<div class="minimap-line${filled ? ' filled' : ''}" style="width:${w}%"></div>`;
            });
            minimapContent.innerHTML = html;
        }

        function updateStats() {
            const val = textarea.value;
            const chars = val.length;
            const words = val.trim() === '' ? 0 : val.trim().split(/\s+/).length;
            charStatus.textContent = chars.toLocaleString() + ' chars';
            wordStatus.textContent = words.toLocaleString() + ' words';

            if (chars > 0) {
                modifiedDot.style.display = 'block';
                fileLabel.textContent = 'Unsaved changes';
                fileLabel.style.color = 'var(--orange)';
            } else {
                modifiedDot.style.display = 'none';
                fileLabel.textContent = 'No changes';
                fileLabel.style.color = 'var(--text-3)';
            }
        }

        function updatePosition() {
            const text = textarea.value;
            const pos = textarea.selectionStart;
            const before = text.substring(0, pos);
            const lines = before.split('\n');
            const ln = lines.length;
            const col = lines[lines.length - 1].length + 1;
            positionStatus.textContent = `Ln ${ln}, Col ${col}`;
        }

        textarea.addEventListener('input', () => { updateLineNumbers(); updateStats(); updateMinimap(); });
        textarea.addEventListener('keyup', updatePosition);
        textarea.addEventListener('click', updatePosition);
        textarea.addEventListener('mouseup', updatePosition);

        textarea.addEventListener('keydown', function (e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
                updateLineNumbers(); updateStats(); updateMinimap();
            }
            if ((e.metaKey || e.ctrlKey) && e.key === 's') {
                e.preventDefault();
                openModal();
            }
        });

        function openModal() {
            const content = textarea.value.trim();
            if (!content) { shakeButton(); return; }
            saveModal.classList.add('active');
            setTimeout(() => promptNameInput.focus(), 100);
        }

        function closeModal() {
            saveModal.classList.remove('active');
            saveForm.reset();
        }

        function shakeButton() {
            saveButton.style.transform = 'translateX(-3px)';
            setTimeout(() => { saveButton.style.transform = 'translateX(3px)'; }, 60);
            setTimeout(() => { saveButton.style.transform = 'translateX(-2px)'; }, 120);
            setTimeout(() => { saveButton.style.transform = 'translateX(0)'; }, 180);
        }

        saveButton.addEventListener('click', openModal);
        cancelButton.addEventListener('click', closeModal);
        saveModal.addEventListener('click', e => { if (e.target === saveModal) closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        saveForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            const promptData = {
                title: promptNameInput.value.trim(),
                body: textarea.value.trim(),
                favorite: promptTagSelect.value === 'favorite' ? 'Favorite' : 'Not favorite',
                type: promptCategorySelect.value === 'system' ? 'System prompt' : 'User prompt'
            };

            const originalHTML = saveButton.innerHTML;
            saveButton.innerHTML = `
                <svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" stroke-dasharray="31.4" stroke-dashoffset="10"/>
                </svg>
                Saving...`;
            saveButton.disabled = true;

            try {
                const response = await fetch(`${API_URL}/prompts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(promptData)
                });

                if (response.ok) {
                    closeModal();
                    textarea.value = '';
                    saveForm.reset();
                    updateLineNumbers(); updateStats(); updateMinimap();

                    toast.querySelector('span').textContent = `"${promptData.title}" saved!`;
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 3200);

                    fileLabel.textContent = 'Saved';
                    fileLabel.style.color = 'var(--green)';
                    modifiedDot.style.display = 'none';
                    setTimeout(() => {
                        fileLabel.textContent = 'No changes';
                        fileLabel.style.color = 'var(--text-3)';
                    }, 3000);
                } else {
                    throw new Error('Failed to save');
                }
            } catch (error) {
                console.error('Error saving:', error);
                alert('Failed to save prompt. Please try again.');
            } finally {
                saveButton.innerHTML = originalHTML;
                saveButton.disabled = false;
            }
        });

        updateLineNumbers(); updateStats(); updateMinimap();
    });
    </script>
</body>
</html>
