<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptHub — Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --surface-2: #1a1a1a;
            --surface-3: #222222;
            --surface-hover: #282828;
            --primary: #E8FF47;
            --primary-dim: rgba(232,255,71,0.10);
            --on-primary: #0a0a0a;
            --blue: #60a5fa;
            --purple: #c084fc;
            --red: #f87171;
            --amber: #fbbf24;
            --green: #4ade80;
            --text: #FAFAFA;
            --text-2: rgba(250,250,250,0.6);
            --text-3: rgba(250,250,250,0.35);
            --border: rgba(255,255,255,0.07);
            --border-active: rgba(232,255,71,0.3);
            --shadow: 0 4px 24px rgba(0,0,0,0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* ─── Layout ─── */
        .app {
            display: flex;
            height: 100vh;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 24px 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .brand-mark {
            width: 30px;
            height: 30px;
            background: var(--primary);
            border-radius: 5px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .brand-mark svg { width: 16px; height: 16px; }

        .sidebar-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 0.06em;
        }

        .sidebar-sub {
            font-size: 11px;
            color: var(--text-3);
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .filter-group {
            margin-bottom: 24px;
        }

        .filter-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 10px;
            display: block;
        }

        select {
            width: 100%;
            background: var(--surface-3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 10px 36px 10px 12px;
            appearance: none;
            cursor: pointer;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 4.5L6 7.5L9 4.5' stroke='rgba(250,250,250,0.4)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }

        select:focus { border-color: var(--primary); background-color: var(--surface-hover); }
        select option { background: #1a1a1a; }

        .stats-widget {
            margin-top: 8px;
            padding: 16px;
            background: var(--surface-3);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .stats-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .stats-label { font-size: 12px; color: var(--text-2); }

        .stats-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            color: var(--primary);
            letter-spacing: 0.04em;
        }

        .stats-bar {
            height: 3px;
            background: var(--surface);
            border-radius: 2px;
            overflow: hidden;
        }

        .stats-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
            width: 100%;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 10px 16px;
            background: var(--surface-3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-2);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }

        .btn-back:hover {
            background: var(--surface-hover);
            border-color: rgba(255,255,255,0.15);
            color: var(--text);
        }

        /* ─── Main ─── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ─── Header ─── */
        .main-header {
            height: 64px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            flex-shrink: 0;
            background: var(--surface);
        }

        .header-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            letter-spacing: 0.06em;
            color: var(--text);
        }

        .search-wrap {
            position: relative;
        }

        .search-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: 13px;
        }

        .search-input {
            background: var(--surface-3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 9px 16px 9px 36px;
            width: 240px;
            outline: none;
            transition: border-color 0.15s, width 0.2s ease;
        }

        .search-input::placeholder { color: var(--text-3); }
        .search-input:focus { border-color: var(--primary); width: 280px; }

        /* ─── List ─── */
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px;
        }

        .prompt-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px 20px;
            margin-bottom: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background 0.15s, border-color 0.2s, transform 0.15s;
        }

        .prompt-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--primary);
            transform: scaleY(0);
            transform-origin: center;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .prompt-card:hover {
            background: var(--surface-2);
            border-color: rgba(255,255,255,0.12);
            transform: translateX(3px);
        }

        .prompt-card:hover::before { transform: scaleY(1); }

        .card-inner {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .card-left {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }

        .card-icon {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: var(--surface-3);
            border: 1px solid var(--border);
            display: grid;
            place-items: center;
            flex-shrink: 0;
            font-size: 14px;
        }

        .card-text { flex: 1; min-width: 0; }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.15s;
        }

        .prompt-card:hover .card-title { color: var(--primary); }

        .card-preview {
            font-size: 12px;
            color: var(--text-3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-badges {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        .badge-fav { background: rgba(251,191,36,0.1); color: var(--amber); border-color: rgba(251,191,36,0.2); }
        .badge-nfav { background: rgba(255,255,255,0.05); color: var(--text-3); border-color: var(--border); }
        .badge-user { background: rgba(96,165,250,0.1); color: var(--blue); border-color: rgba(96,165,250,0.2); }
        .badge-sys { background: rgba(192,132,252,0.1); color: var(--purple); border-color: rgba(192,132,252,0.2); }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 280px;
            color: var(--text-3);
            gap: 12px;
        }

        .empty-state i { font-size: 36px; opacity: 0.3; }
        .empty-state p { font-size: 13px; }

        /* ─── Modal overlay ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease;
            padding: 20px;
        }

        .modal-overlay.hidden { display: none; }
        .modal-overlay.opacity-0 { opacity: 0; pointer-events: none; }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 100%;
            max-width: 640px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 32px 80px rgba(0,0,0,0.8);
            transform: scale(1);
            transition: transform 0.2s ease;
        }

        .modal-box.scale-95 { transform: scale(0.95); }
        .modal-box.scale-100 { transform: scale(1); }

        .modal-header {
            padding: 22px 24px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .modal-title-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 0.03em;
            color: var(--text);
            margin-bottom: 8px;
        }

        .modal-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-2);
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .btn-icon:hover { background: var(--surface-3); color: var(--text); }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 22px 24px;
        }

        .prompt-display {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
        }

        .prompt-display p {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            color: var(--text-2);
            line-height: 1.75;
            white-space: pre-wrap;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface-2);
            border-radius: 0 0 12px 12px;
        }

        .btn-md {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s ease;
            text-decoration: none;
        }

        .btn-danger { background: rgba(248,113,113,0.1); color: var(--red); border-color: rgba(248,113,113,0.2); }
        .btn-danger:hover { background: rgba(248,113,113,0.2); }

        .btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
        .btn-ghost:hover { background: var(--surface-3); color: var(--text); }

        .btn-amber { background: rgba(251,191,36,0.12); color: var(--amber); border-color: rgba(251,191,36,0.2); }
        .btn-amber:hover { background: rgba(251,191,36,0.22); }

        .btn-blue { background: rgba(96,165,250,0.12); color: var(--blue); border-color: rgba(96,165,250,0.2); }
        .btn-blue:hover { background: rgba(96,165,250,0.22); }

        .btn-green { background: rgba(74,222,128,0.12); color: var(--green); border-color: rgba(74,222,128,0.2); }
        .btn-green:hover { background: rgba(74,222,128,0.22); }

        .footer-right { display: flex; gap: 8px; align-items: center; }

        /* Edit textarea */
        .edit-textarea {
            width: 100%;
            min-height: 200px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
            padding: 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.15s;
        }

        .edit-textarea:focus { border-color: var(--primary); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: var(--surface);
            border: 1px solid var(--green);
            border-left: 3px solid var(--green);
            color: var(--text);
            padding: 12px 18px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 28px rgba(0,0,0,0.6);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.25s ease;
            z-index: 500;
            pointer-events: none;
        }

        .toast.visible { opacity: 1; transform: translateY(0); }
        .toast.error { border-color: var(--red); }
        .toast.error i { color: var(--red); }
        .toast i { color: var(--green); }

        /* date text in modal */
        .modal-date { font-size: 11px; color: var(--text-3); }
    </style>
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <div class="brand-mark">
                    <svg viewBox="0 0 16 16" fill="none">
                        <rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.2" fill="#0a0a0a"/>
                        <rect x="9" y="1.5" width="5.5" height="5.5" rx="1.2" fill="#0a0a0a" opacity="0.6"/>
                        <rect x="1.5" y="9" width="5.5" height="5.5" rx="1.2" fill="#0a0a0a" opacity="0.55"/>
                        <rect x="9" y="9" width="5.5" height="5.5" rx="1.2" fill="#0a0a0a" opacity="0.3"/>
                    </svg>
                </div>
                <span class="sidebar-title">PromptHub</span>
            </div>
            <div class="sidebar-sub">Manage your AI interactions</div>
        </div>

        <div class="sidebar-body">
            <div class="filter-group">
                <span class="filter-label">Filter by Tag</span>
                <select id="filterTag">
                    <option value="all">All Tags</option>
                    <option value="Favorite">Favorite</option>
                    <option value="Not favorite">Not Favorite</option>
                </select>
            </div>

            <div class="filter-group">
                <span class="filter-label">Filter by Category</span>
                <select id="filterCategory">
                    <option value="all">All Categories</option>
                    <option value="User prompt">User Prompt</option>
                    <option value="System prompt">System Prompt</option>
                </select>
            </div>

            <div class="stats-widget">
                <div class="stats-row">
                    <span class="stats-label">Total Items</span>
                    <span class="stats-val" id="totalCount">0</span>
                </div>
                <div class="stats-bar"><div class="stats-bar-fill"></div></div>
            </div>
        </div>

        <div class="sidebar-footer">
            <a href="index.html" class="btn-back">
                <i class="fa-solid fa-arrow-left" style="font-size:12px;"></i>
                Back to Home
            </a>
        </div>
    </aside>

    <!-- Main -->
    <main class="main">
        <header class="main-header">
            <span class="header-title">Library</span>
            <div class="search-wrap">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Search prompts...">
            </div>
        </header>

        <div class="list-container" id="listContainer">
            <!-- Cards injected by JS -->
        </div>
    </main>
</div>

<!-- View Modal -->
<div id="modalOverlay" class="modal-overlay hidden opacity-0">
    <div id="modalContent" class="modal-box scale-95">
        <div class="modal-header">
            <div style="flex:1;min-width:0;">
                <div class="modal-title-text" id="modalTitle">Prompt Title</div>
                <div class="modal-badges" id="modalBadges"></div>
            </div>
            <button class="btn-icon" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="viewModeBody">
            <div class="prompt-display">
                <p id="modalBody"></p>
            </div>
        </div>
        <div class="modal-footer" id="viewModeFooter">
            <button class="btn-md btn-danger" id="deleteBtn"><i class="fa-regular fa-trash-can"></i> Delete</button>
            <div class="footer-right">
                <button class="btn-md btn-ghost" id="closeModalBtnBottom">Close</button>
                <button class="btn-md btn-amber" id="editBtn"><i class="fa-regular fa-pen-to-square"></i> Edit</button>
                <button class="btn-md btn-blue" id="copyBtn"><i class="fa-regular fa-copy"></i> Copy</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModalOverlay" class="modal-overlay hidden opacity-0">
    <div id="editModalContent" class="modal-box scale-95">
        <div class="modal-header">
            <div>
                <div class="modal-title-text">Edit Prompt</div>
                <div style="font-size:12px;color:var(--text-3);">Modify the prompt body below</div>
            </div>
            <button class="btn-icon" id="closeEditModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <textarea id="editTextarea" class="edit-textarea" placeholder="Enter your prompt here..."></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn-md btn-ghost" id="cancelEditBtn">Cancel</button>
            <button class="btn-md btn-green" id="updateBtn"><i class="fa-solid fa-check"></i> Update</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast">
    <i class="fa-solid fa-circle-check"></i>
    <span>Done!</span>
</div>

<script>
    const API_URL = "/api";

    let data = [];
    let currentItemId = null;
    let currentItemBody = "";

    const listContainer = document.getElementById('listContainer');
    const filterTag = document.getElementById('filterTag');
    const filterCategory = document.getElementById('filterCategory');
    const searchInput = document.getElementById('searchInput');
    const totalCount = document.getElementById('totalCount');

    const modalOverlay = document.getElementById('modalOverlay');
    const modalContent = document.getElementById('modalContent');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalBadges = document.getElementById('modalBadges');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const closeModalBtnBottom = document.getElementById('closeModalBtnBottom');
    const copyBtn = document.getElementById('copyBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const editBtn = document.getElementById('editBtn');

    const editModalOverlay = document.getElementById('editModalOverlay');
    const editModalContent = document.getElementById('editModalContent');
    const editTextarea = document.getElementById('editTextarea');
    const closeEditModalBtn = document.getElementById('closeEditModalBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const updateBtn = document.getElementById('updateBtn');
    const toast = document.getElementById('toast');

    // ── API ──

    async function fetchPrompts() {
        const params = new URLSearchParams();
        const tagValue = filterTag.value;
        const catValue = filterCategory.value;
        const searchValue = searchInput.value;
        if (tagValue && tagValue !== 'all') params.append('tag', tagValue);
        if (catValue && catValue !== 'all') params.append('category', catValue);
        if (searchValue) params.append('search', searchValue);

        try {
            const response = await fetch(`${API_URL}/prompts?${params}`);
            data = await response.json();
            renderList();
        } catch (error) {
            console.error('Error fetching prompts:', error);
            showErrorToast('Failed to load prompts');
        }
    }

    async function deletePromptAPI(id) {
        try {
            const response = await fetch(`${API_URL}/prompts/${id}`, { method: 'DELETE' });
            if (response.ok) {
                showToast('Prompt deleted');
                fetchPrompts();
            }
        } catch (error) {
            showErrorToast('Failed to delete prompt');
        }
    }

    async function updatePromptAPI(id, body) {
        try {
            const response = await fetch(`${API_URL}/prompts/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ body })
            });
            if (response.ok) {
                showToast('Prompt updated');
                closeEditModal();
                closeViewModal();
                fetchPrompts();
            } else {
                showErrorToast('Failed to update prompt');
            }
        } catch (error) {
            showErrorToast('Failed to update prompt');
        }
    }

    // ── UI ──

    function truncateText(text, wordCount = 9) {
        const words = text.split(' ');
        return words.length > wordCount ? words.slice(0, wordCount).join(' ') + '...' : text;
    }

    function getBadgeClass(type, value) {
        if (type === 'favorite') return value === 'Favorite' ? 'badge-fav' : 'badge-nfav';
        if (type === 'type') return value === 'User prompt' ? 'badge-user' : 'badge-sys';
        return '';
    }

    function renderList() {
        totalCount.innerText = data.length;
        listContainer.innerHTML = '';

        if (data.length === 0) {
            listContainer.innerHTML = `
                <div class="empty-state">
                    <i class="fa-regular fa-folder-open"></i>
                    <p>No prompts found matching your criteria.</p>
                </div>`;
            return;
        }

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'prompt-card';
            card.onclick = () => openModal(item);

            const iconClass = item.type === 'User prompt'
                ? 'fa-user' : 'fa-robot';
            const iconColor = item.type === 'User prompt'
                ? 'color:var(--blue)' : 'color:var(--purple)';

            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-left">
                        <div class="card-icon">
                            <i class="fa-solid ${iconClass}" style="${iconColor};font-size:14px;"></i>
                        </div>
                        <div class="card-text">
                            <div class="card-title">${item.title}</div>
                            <div class="card-preview">${truncateText(item.body)}</div>
                        </div>
                    </div>
                    <div class="card-badges">
                        <span class="badge ${getBadgeClass('favorite', item.favorite)}">
                            ${item.favorite === 'Favorite' ? '★ ' : ''}${item.favorite}
                        </span>
                        <span class="badge ${getBadgeClass('type', item.type)}">${item.type}</span>
                    </div>
                </div>`;
            listContainer.appendChild(card);
        });
    }

    function openModal(item) {
        currentItemId = item.id;
        currentItemBody = item.body;
        modalTitle.innerText = item.title;
        modalBody.innerText = item.body;

        modalBadges.innerHTML = `
            <span class="badge ${getBadgeClass('favorite', item.favorite)}">${item.favorite}</span>
            <span class="badge ${getBadgeClass('type', item.type)}">${item.type}</span>
            <span class="modal-date"><i class="fa-regular fa-calendar" style="margin-right:4px;"></i>${item.date}</span>`;

        modalOverlay.classList.remove('hidden');
        setTimeout(() => {
            modalOverlay.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        }, 10);
    }

    function closeViewModal() {
        modalOverlay.classList.add('opacity-0');
        modalContent.classList.remove('scale-100');
        modalContent.classList.add('scale-95');
        setTimeout(() => {
            modalOverlay.classList.add('hidden');
            currentItemId = null;
            currentItemBody = "";
        }, 250);
    }

    function openEditModal() {
        editTextarea.value = currentItemBody;
        editModalOverlay.classList.remove('hidden');
        setTimeout(() => {
            editModalOverlay.classList.remove('opacity-0');
            editModalContent.classList.remove('scale-95');
            editModalContent.classList.add('scale-100');
            editTextarea.focus();
        }, 10);
    }

    function closeEditModal() {
        editModalOverlay.classList.add('opacity-0');
        editModalContent.classList.remove('scale-100');
        editModalContent.classList.add('scale-95');
        setTimeout(() => { editModalOverlay.classList.add('hidden'); }, 250);
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(modalBody.innerText).then(() => showToast('Copied to clipboard!'));
    }

    function handleUpdate() {
        const updatedBody = editTextarea.value.trim();
        if (!updatedBody) { showErrorToast('Prompt body cannot be empty'); return; }
        if (currentItemId !== null) updatePromptAPI(currentItemId, updatedBody);
    }

    let toastTimer;
    function showToast(message = 'Done!') {
        const span = toast.querySelector('span');
        const icon = toast.querySelector('i');
        span.textContent = message;
        toast.classList.remove('error');
        icon.className = 'fa-solid fa-circle-check';
        icon.style.color = 'var(--green)';
        toast.style.borderColor = 'var(--green)';
        toast.classList.add('visible');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('visible'), 3000);
    }

    function showErrorToast(message) {
        const span = toast.querySelector('span');
        const icon = toast.querySelector('i');
        span.textContent = message;
        toast.classList.add('error');
        icon.className = 'fa-solid fa-circle-xmark';
        icon.style.color = 'var(--red)';
        toast.style.borderColor = 'var(--red)';
        toast.classList.add('visible');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('visible'), 3000);
    }

    // ── Events ──
    filterTag.addEventListener('change', fetchPrompts);
    filterCategory.addEventListener('change', fetchPrompts);
    searchInput.addEventListener('input', debounce(fetchPrompts, 300));
    closeModalBtn.addEventListener('click', closeViewModal);
    closeModalBtnBottom.addEventListener('click', closeViewModal);
    copyBtn.addEventListener('click', copyToClipboard);
    deleteBtn.addEventListener('click', () => { if (currentItemId !== null) { deletePromptAPI(currentItemId); closeViewModal(); } });
    editBtn.addEventListener('click', openEditModal);
    closeEditModalBtn.addEventListener('click', closeEditModal);
    cancelEditBtn.addEventListener('click', closeEditModal);
    updateBtn.addEventListener('click', handleUpdate);

    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeViewModal(); });
    editModalOverlay.addEventListener('click', e => { if (e.target === editModalOverlay) closeEditModal(); });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            if (!editModalOverlay.classList.contains('hidden')) closeEditModal();
            else if (!modalOverlay.classList.contains('hidden')) closeViewModal();
        }
    });

    function debounce(func, wait) {
        let timeout;
        return function (...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func(...args), wait);
        };
    }

    fetchPrompts();
</script>
</body>
</html>
