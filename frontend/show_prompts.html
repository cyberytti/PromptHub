<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptHub — Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/static/show_prompts_style.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <div class="brand-mark">
                    <svg viewBox="0 0 16 16" fill="none">
                        <rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.2" fill="#0a0a0a"/>
                        <rect x="9" y="1.5" width="5.5" height="5.5" rx="1.2" fill="#0a0a0a" opacity="0.6"/>
                        <rect x="1.5" y="9" width="5.5" height="5.5" rx="1.2" fill="#0a0a0a" opacity="0.55"/>
                        <rect x="9" y="9" width="5.5" height="5.5" rx="1.2" fill="#0a0a0a" opacity="0.3"/>
                    </svg>
                </div>
                <span class="sidebar-title">PromptHub</span>
            </div>
            <div class="sidebar-sub">Manage your AI interactions</div>
        </div>

        <div class="sidebar-body">
            <div class="filter-group">
                <span class="filter-label">Filter by Tag</span>
                <select id="filterTag">
                    <option value="all">All Tags</option>
                    <option value="Favorite">Favorite</option>
                    <option value="Not favorite">Not Favorite</option>
                </select>
            </div>

            <div class="filter-group">
                <span class="filter-label">Filter by Category</span>
                <select id="filterCategory">
                    <option value="all">All Categories</option>
                    <option value="User prompt">User Prompt</option>
                    <option value="System prompt">System Prompt</option>
                </select>
            </div>

            <div class="stats-widget">
                <div class="stats-row">
                    <span class="stats-label">Total Items</span>
                    <span class="stats-val" id="totalCount">0</span>
                </div>
                <div class="stats-bar"><div class="stats-bar-fill"></div></div>
            </div>
        </div>

        <div class="sidebar-footer">
            <a href="/" class="btn-back">
                <i class="fa-solid fa-arrow-left" style="font-size:12px;"></i>
                Back to Home
            </a>
        </div>
    </aside>

    <!-- Main -->
    <main class="main">
        <header class="main-header">
            <span class="header-title">Library</span>
            <div class="search-wrap">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Search prompts...">
            </div>
        </header>

        <div class="list-container" id="listContainer">
            <!-- Cards injected by JS -->
        </div>
    </main>
</div>

<!-- View Modal -->
<div id="modalOverlay" class="modal-overlay hidden opacity-0">
    <div id="modalContent" class="modal-box scale-95">
        <div class="modal-header">
            <div style="flex:1;min-width:0;">
                <div class="modal-title-text" id="modalTitle">Prompt Title</div>
                <div class="modal-badges" id="modalBadges"></div>
            </div>
            <button class="btn-icon" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="viewModeBody">
            <div class="prompt-display">
                <p id="modalBody"></p>
            </div>
        </div>
        <div class="modal-footer" id="viewModeFooter">
            <button class="btn-md btn-danger" id="deleteBtn"><i class="fa-regular fa-trash-can"></i> Delete</button>
            <div class="footer-right">
                <!-- <button class="btn-md btn-ghost" id="closeModalBtnBottom">Close</button> -->
                <button class="btn-md btn-amber" id="editBtn"><i class="fa-regular fa-pen-to-square"></i> Edit</button>
                <button class="btn-md btn-blue" id="copyBtn"><i class="fa-regular fa-copy"></i> Copy</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModalOverlay" class="modal-overlay hidden opacity-0">
    <div id="editModalContent" class="modal-box scale-95">
        <div class="modal-header">
            <div>
                <div class="modal-title-text">Edit Prompt</div>
                <div style="font-size:12px;color:var(--text-3);">Modify the prompt body below</div>
            </div>
            <button class="btn-icon" id="closeEditModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <textarea id="editTextarea" class="edit-textarea" placeholder="Enter your prompt here..."></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn-md btn-ghost" id="cancelEditBtn">Cancel</button>
            <button class="btn-md btn-green" id="updateBtn"><i class="fa-solid fa-check"></i> Update</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast">
    <i class="fa-solid fa-circle-check"></i>
    <span>Done!</span>
</div>

<script src="/frontend/scripts/show_prompt_script.js"></script>
</body>
</html>
